<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0C">
    <title>VV Pulse | Field Operations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0C;
            color: #fff;
            font-family: -apple-system, 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .logo {
            width: 64px; height: 64px;
            background: #fff;
            color: #000;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        p { color: #8E8E93; font-size: 15px; max-width: 280px; line-height: 1.5; }
        .badge {
            margin-top: 32px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            font-size: 12px;
            color: #8E8E93;
        }
        .badge span { color: #32D74B; }
    </style>
</head>
<body>
    <div class="logo">VV</div>
    <h1>VV Pulse</h1>
    <p>Real-time field operations platform for VV Hybrid Universe</p>
    <div class="badge">Foundation: <span>Ready</span> · MVP: Coming Soon</div>

</body>
</html>
